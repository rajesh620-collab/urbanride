<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="UrbanRide — Smart ride-pooling for urban commuters. Share rides, save money, reduce emissions." />
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://urbanride.app/">
    <meta property="og:title" content="UrbanRide — Share the Ride, Split the Cost">
    <meta property="og:description" content="Connect with commuters heading your way. Save money, reduce emissions, and make every ride count.">
    <meta property="og:image" content="https://urbanride.app/og-image.png">
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="UrbanRide — Share the Ride, Split the Cost">
    <meta property="twitter:description" content="Connect with commuters heading your way. Save money, reduce emissions, and make every ride count.">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      (function() {
        try {
          const saved = localStorage.getItem('theme');
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          const dark = saved ? saved === 'dark' : (saved ? false : prefersDark);
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'bright');
        } catch (e) {}
      })();
    </script>
    <title>UrbanRide — Smart Ride Pooling</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
